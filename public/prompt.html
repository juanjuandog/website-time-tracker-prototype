<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>选择分类</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #563b2f;
        background: transparent;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: stretch;
        background: transparent;
        overflow: hidden;
      }

      .card {
        width: 100vw;
        min-height: 100vh;
        padding: 32px 34px;
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 30px;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 236, 167, 0.76), transparent 56%),
          linear-gradient(145deg, rgba(255, 253, 247, 0.98), rgba(255, 248, 231, 0.94));
        box-shadow:
          0 24px 70px rgba(108, 76, 45, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
      }

      .kicker {
        color: #e7603a;
        font-size: 14px;
        font-weight: 820;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 8px;
        color: #563b2f;
        font-size: 24px;
        line-height: 1.1;
        font-weight: 860;
      }

      p {
        margin-top: 10px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #8b7164;
        font-size: 16px;
        font-weight: 760;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 28px;
      }

      button {
        min-height: 44px;
        border: 1px solid rgba(108, 74, 56, 0.13);
        border-radius: 999px;
        background: rgba(255, 251, 244, 0.74);
        color: #5b4034;
        font: inherit;
        font-weight: 820;
        cursor: pointer;
        box-shadow: 0 10px 22px rgba(101, 72, 45, 0.08);
      }

      button:hover {
        background: #e8845c;
        color: #fffaf2;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <span id="kicker" class="kicker">新网站</span>
      <h1>选择分类</h1>
      <p id="name">等待检测</p>
      <div id="actions" class="actions"></div>
    </section>
    <script>
      const API_BASE = "http://127.0.0.1:4174";
      const els = {
        kicker: document.querySelector("#kicker"),
        name: document.querySelector("#name"),
        actions: document.querySelector("#actions")
      };
      let target = null;
      let targetKey = "";

      async function refresh() {
        try {
          const res = await fetch(`${API_BASE}/api/state`);
          const data = await res.json();
          target = data.unknownCategoryTarget;
          if (!target) {
            targetKey = "";
            return;
          }
          const nextKey = `${target.type}:${target.key}`;
          if (nextKey === targetKey) return;
          targetKey = nextKey;
          els.kicker.textContent = target.type === "app" ? "新 App" : "新网站";
          els.name.textContent = target.label || target.key;
          els.actions.innerHTML = ["学习", "娱乐", "社交", "其他"]
            .map((category) => `<button type="button" data-category="${category}">${category}</button>`)
            .join("");
          els.actions.querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", () => saveRule(button.dataset.category));
          });
        } catch {
          els.name.textContent = "等待本地服务";
        }
      }

      async function saveRule(category) {
        if (!target) return;
        await fetch(`${API_BASE}/api/category-rule`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            type: target.type,
            pattern: target.key,
            category
          })
        });
        targetKey = "";
        await refresh();
      }

      refresh();
      setInterval(refresh, 1000);
    </script>
  </body>
</html>
